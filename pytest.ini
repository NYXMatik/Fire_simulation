[pytest]
pythonpath = .

# All tests live under tests/. Keeping this explicit prevents pytest from trying
# to collect generated map/result folders or old exploratory scripts.
testpaths = tests

# Test files use the standard pytest naming convention.
python_files = test_*.py

# -s keeps the explanatory print output visible.
# -v prints every scenario name, which matters for parameterized tests.
# --tb=short keeps failures readable.
# cacheprovider is disabled because the workspace can reject pytest cache writes.
addopts = -s -v --tb=short -p no:cacheprovider

# Ignore generated or data-heavy folders if they exist.
norecursedirs = pytest-cache-files-* __pycache__ results results_quick_check maps
