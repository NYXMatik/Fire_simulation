name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    name: Pytest report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests and generate reports
        shell: bash
        run: |
          mkdir -p reports
          set +e
          python -m pytest \
            --capture=tee-sys \
            --json-report \
            --json-report-file=reports/pytest-report.json \
            --html=reports/pytest-report.html \
            --self-contained-html \
            --junitxml=reports/pytest-junit.xml \
            | tee reports/pytest-output.txt
          pytest_status=${PIPESTATUS[0]}
          set -e
          python scripts/build_test_report.py \
            --json reports/pytest-report.json \
            --output reports/fire-simulation-test-report.html
          exit "$pytest_status"

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fire-simulation-test-report
          path: reports/
          retention-days: 90

      - name: Add report link to job summary
        if: always()
        run: |
          echo "## Fire Simulation test report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the artifact named \`fire-simulation-test-report\` from this workflow run to get:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`pytest-report.html\` - browsable HTML test report" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`fire-simulation-test-report.html\` - custom summary with chart and per-test output" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`pytest-report.json\` - structured pytest report used to build the custom HTML report" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`pytest-junit.xml\` - machine-readable JUnit report" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`pytest-output.txt\` - full console output with printed metrics" >> "$GITHUB_STEP_SUMMARY"
